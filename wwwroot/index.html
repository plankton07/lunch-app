<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정산방</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadRooms()">

<div class="container">
    <h1>💸 콩스밥밥</h1>

    <div class="card">
        <input id="roomTitle" placeholder="방 제목" />
        <input id="roomHost" placeholder="방장 이름" />
        <input id="roomPassword" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="삭제 비밀번호 4자리" />
        <input id="roomLink" placeholder="배달 링크 (선택)" />

        <button onclick="createRoom()">방 만들기</button>
    </div>

    <h3>📋 콩스밥밥 기차 리스트</h3>
    <div id="roomList"></div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
<script src="app.js"></script>
</body>
</html>
